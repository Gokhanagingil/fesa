# Manual staging deployment to the Hetzner Ubuntu server (no Docker in this wave).
name: Staging deploy

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to deploy (branch, tag, or full SHA)'
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging

    env:
      STAGING_HOST: ${{ vars.STAGING_HOST }}
      STAGING_USER: ${{ vars.STAGING_USER }}
      STAGING_PORT: ${{ vars.STAGING_PORT }}
      STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR }}

    steps:
      - name: Validate GitHub environment configuration
        run: |
          set -euo pipefail
          missing=0
          for name in STAGING_HOST STAGING_USER STAGING_PORT STAGING_APP_DIR; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing environment variable: $name (configure in GitHub → Settings → Environments → staging)"
              missing=1
            fi
          done
          if [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            echo "::error::Missing secret STAGING_SSH_KEY"
            missing=1
          fi
          # Sanity checks (no secrets printed)
          if [ -n "${STAGING_APP_DIR:-}" ]; then
            case "${STAGING_APP_DIR}" in
              /*) ;;
              *)
                echo "::error::STAGING_APP_DIR must be an absolute path (start with /). Got a relative-looking value."
                missing=1
                ;;
            esac
          fi
          if [ -n "${STAGING_PORT:-}" ]; then
            case "${STAGING_PORT}" in
              ''|*[!0-9]*)
                echo "::error::STAGING_PORT must be a numeric port number."
                missing=1
                ;;
            esac
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout (records exact workflow revision; deploy runs from server git)
        uses: actions/checkout@v4

      - name: Install SSH key (ssh-agent)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Safe connection summary (no secrets)
        run: |
          set -euo pipefail
          echo "SSH target: user=${STAGING_USER} host=${STAGING_HOST} port=${STAGING_PORT}"
          echo "STAGING_APP_DIR length: ${#STAGING_APP_DIR} chars (absolute path on server)"
          if [ -n "${SSH_AUTH_SOCK:-}" ]; then
            echo "ssh-agent: SSH_AUTH_SOCK is set (agent available for this job)"
          else
            echo "::warning::SSH_AUTH_SOCK is empty — ssh-agent may not be available; SSH can fail."
          fi

      - name: Add server host keys to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Hash hostnames in known_hosts; fetch common key types
          ssh-keyscan -p "${STAGING_PORT}" -H -t rsa,ecdsa,ed25519 "${STAGING_HOST}" >> ~/.ssh/known_hosts

      - name: Preflight — SSH authentication (BatchMode, no password prompts)
        run: |
          set -euo pipefail
          # shellcheck disable=SC2206
          ssh_opts=(
            -p "${STAGING_PORT}"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o StrictHostKeyChecking=yes
          )
          if [ -n "${SSH_AUTH_SOCK:-}" ]; then
            ssh_opts+=( -o "IdentityAgent=${SSH_AUTH_SOCK}" )
          fi
          if ! ssh "${ssh_opts[@]}" "${STAGING_USER}@${STAGING_HOST}" 'echo "SSH preflight OK: connected as $(whoami) @ $(hostname)"'; then
            echo "::error::SSH preflight failed — the runner could not authenticate to ${STAGING_USER}@${STAGING_HOST}:${STAGING_PORT}."
            echo "Common causes: (1) STAGING_SSH_KEY secret does not match a public key in ~${STAGING_USER}/.ssh/authorized_keys on the server;"
            echo "(2) wrong STAGING_USER or STAGING_HOST or STAGING_PORT; (3) authorized_keys permissions/ownership on the server;"
            echo "(4) sshd disallows this key type or PubkeyAuthentication. See docs/staging-deploy.md (SSH troubleshooting)."
            exit 1
          fi

      - name: Run remote deploy script
        run: |
          set -euo pipefail
          ssh_opts=(
            -p "${STAGING_PORT}"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o StrictHostKeyChecking=yes
          )
          if [ -n "${SSH_AUTH_SOCK:-}" ]; then
            ssh_opts+=( -o "IdentityAgent=${SSH_AUTH_SOCK}" )
          fi
          ssh "${ssh_opts[@]}" \
            "${STAGING_USER}@${STAGING_HOST}" \
            "export FESA_REPO_ROOT='${STAGING_APP_DIR}'; export DEPLOY_GIT_REF='${{ inputs.git_ref }}'; bash -s" \
            < deploy/staging/deploy.sh

      - name: Health check on server
        run: |
          set -euo pipefail
          ssh_opts=(
            -p "${STAGING_PORT}"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o StrictHostKeyChecking=yes
          )
          if [ -n "${SSH_AUTH_SOCK:-}" ]; then
            ssh_opts+=( -o "IdentityAgent=${SSH_AUTH_SOCK}" )
          fi
          ssh "${ssh_opts[@]}" \
            "${STAGING_USER}@${STAGING_HOST}" \
            "export FESA_REPO_ROOT='${STAGING_APP_DIR}'; bash -s" \
            < deploy/staging/health-check.sh

      - name: Failure diagnostics on server
        if: failure()
        run: |
          set -euo pipefail
          ssh_opts=(
            -p "${STAGING_PORT}"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o StrictHostKeyChecking=yes
          )
          if [ -n "${SSH_AUTH_SOCK:-}" ]; then
            ssh_opts+=( -o "IdentityAgent=${SSH_AUTH_SOCK}" )
          fi
          ssh "${ssh_opts[@]}" \
            "${STAGING_USER}@${STAGING_HOST}" \
            "export FESA_REPO_ROOT='${STAGING_APP_DIR}'; bash -s" <<'EOF'
          set -euo pipefail
          API_PORT="${API_PORT:-3000}"
          if [[ -n "${FESA_REPO_ROOT:-}" && -f "${FESA_REPO_ROOT}/apps/api/.env" ]]; then
            line="$(grep -E '^[[:space:]]*(export[[:space:]]+)?API_PORT=' "${FESA_REPO_ROOT}/apps/api/.env" | tail -1 || true)"
            if [[ -n "$line" ]]; then
              val="${line#*=}"
              val="${val#\"}"
              val="${val%\"}"
              val="${val#\'}"
              val="${val%\'}"
              [[ -n "$val" ]] && API_PORT="$val"
            fi
          fi
          echo "==> Failure diagnostics"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Repo root: ${FESA_REPO_ROOT:-unknown}"
          echo "API port: ${API_PORT}"
          echo ""
          if command -v pm2 >/dev/null 2>&1; then
            echo "==> pm2 describe fesa-api-staging"
            pm2 describe fesa-api-staging --no-color || pm2 list || true
            pm2_env="$(pm2 jlist 2>/dev/null | node -e "
              let data=''; process.stdin.on('data', (c) => data += c);
              process.stdin.on('end', () => {
                try {
                  const items = JSON.parse(data);
                  const row = items.find((item) => item.name === 'fesa-api-staging');
                  if (!row || !row.pm2_env) return;
                  const out = row.pm2_env.pm_out_log_path || '';
                  const err = row.pm2_env.pm_err_log_path || '';
                  process.stdout.write(`${out}\n${err}`);
                } catch (error) {
                  process.exit(0);
                }
              });
            " || true)"
            pm2_out_log="$(printf '%s\n' "$pm2_env" | sed -n '1p')"
            pm2_err_log="$(printf '%s\n' "$pm2_env" | sed -n '2p')"
            if [[ -n "${pm2_err_log:-}" && -f "${pm2_err_log}" ]]; then
              echo ""
              echo "==> Last 100 lines of PM2 error log"
              tail -n 100 "${pm2_err_log}" || true
            fi
            if [[ -n "${pm2_out_log:-}" && -f "${pm2_out_log}" ]]; then
              echo ""
              echo "==> Last 100 lines of PM2 out log"
              tail -n 100 "${pm2_out_log}" || true
            fi
          else
            echo "(pm2 not in PATH — skipped)"
          fi
          echo ""
          echo "==> Direct curl context"
          curl -sv "http://127.0.0.1:${API_PORT}/api/health/live" >/dev/null || true
          EOF

      - name: Deployment summary
        if: success()
        run: |
          echo "Staging deploy finished successfully."
          echo "App directory: ${STAGING_APP_DIR}"
          echo "Git ref: ${{ inputs.git_ref }}"
