# Reusable validation pipeline (no deploy). Called from ci.yml and manual-validate.yml.
name: Reusable — monorepo validation

on:
  workflow_call:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, guard, lint, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fesa_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fesa_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fesa_ci
      NODE_ENV: staging
      DB_SYNCHRONIZE: 'false'
      DB_RUN_MIGRATIONS: 'false'
      API_PORT: '3101'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repo structure guard
        run: node scripts/repo-guard.mjs

      - name: Lint (workspaces)
        run: npm run lint

      - name: Frontend reporting smoke
        run: npm run frontend:smoke

      - name: i18n parity check
        run: npm run i18n:check

      - name: Build (workspaces)
        run: npm run build

      - name: Reporting filter validator smoke
        run: npm run reporting:filter-tree:test

      - name: Reporting starter-view integrity smoke
        run: npm run reporting:starter-views:test

      - name: Athlete photo / media storage isolation smoke
        run: npm run media:isolation:test

      - name: WhatsApp delivery contract smoke
        run: npm run whatsapp:delivery:test

      - name: Tenant branding validator smoke
        run: npm run tenant:branding:test

      - name: Migration readiness (disposable PostgreSQL)
        run: npm run migration:run -w @amateur/api

      - name: Demo seed repeatability
        run: npm run seed:demo:verify

      - name: Backend boot smoke
        run: npm run api:boot:smoke
