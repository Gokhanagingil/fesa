# Reusable validation pipeline (no deploy). Called from ci.yml and manual-validate.yml.
name: Reusable — monorepo validation

on:
  workflow_call:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, guard, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repo structure guard
        run: node scripts/repo-guard.mjs

      - name: Lint (workspaces)
        run: npm run lint

      - name: Build (workspaces)
        run: npm run build
